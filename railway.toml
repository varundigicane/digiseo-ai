# Used by Railway service web-v2 (rootDirectory unset → repo root).
# apps/api and apps/web keep their own railway.toml via rootDirectory.

[build]
builder = "RAILPACK"
buildCommand = "npm run build --workspace=apps/web"

[deploy]
startCommand = "npm run start --workspace=apps/web"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
