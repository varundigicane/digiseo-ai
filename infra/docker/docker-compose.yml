services:
  postgres:
    image: postgres:16-alpine
    container_name: digiseo-postgres
    environment:
      POSTGRES_USER: digiseo
      POSTGRES_PASSWORD: digiseo
      POSTGRES_DB: digiseo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digiseo -d digiseo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: digiseo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: digiseo-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: digiseo-api
    env_file:
      - ../../.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://digiseo:digiseo@postgres:5432/digiseo
      DATABASE_URL_SYNC: postgresql://digiseo:digiseo@postgres:5432/digiseo
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      MOCK_LLM: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    profiles:
      - full

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    container_name: digiseo-worker
    env_file:
      - ../../.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://digiseo:digiseo@postgres:5432/digiseo
      DATABASE_URL_SYNC: postgresql://digiseo:digiseo@postgres:5432/digiseo
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      MOCK_LLM: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    profiles:
      - full

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
